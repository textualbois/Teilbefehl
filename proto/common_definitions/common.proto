syntax = "proto3";

package strat_game.common_definitions;

message Coordinates {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
}

message UnitId {
  string value = 1;
}

enum UnitType {
  UNIT_TYPE_UNSPECIFIED = 0;
  UNIT_TYPE_VILLAGER = 1;
  UNIT_TYPE_SCOUT = 2;
  UNIT_TYPE_MELEE_SOLDIER = 3;
  UNIT_TYPE_HUNTER = 4;
  UNIT_TYPE_RANGED_SOLDIER = 5;
}

enum TerrainType {
  TERRAIN_TYPE_UNSPECIFIED = 0;
  TERRAIN_TYPE_GRASS = 1;
  TERRAIN_TYPE_DIRT = 2;
  TERRAIN_TYPE_MUD = 3;
  TERRAIN_TYPE_WATER = 4;
  TERRAIN_TYPE_SAND = 5;
}

enum BuildingType {
  BUILDING_TYPE_UNSPECIFIED = 0;
  BUILDING_TYPE_BASE_CAMP = 1;
  BUILDING_TYPE_WATCH_TOWER = 2;
  BUILDING_TYPE_CASTLE = 3;
  BUILDING_TYPE_TRAINING_GROUND = 4;
  BUILDING_TYPE_ARMORY = 5;
  BUILDING_TYPE_STABLE = 6;
  BUILDING_TYPE_TOWNHALL = 7;
  BUILDING_TYPE_FORT = 8;
  BUILDING_TYPE_SIGNAL_TOWER = 9;
}
