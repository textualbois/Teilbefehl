syntax = "proto3";

package strat_game.common_definitions;

import "common_definitions/common.proto";

message BaseLayerDefinition {
  TerrainType terrain_type = 1;
  string name = 2;
  string color_id = 3;
  bool passable = 4;
  optional uint32 movement_cost = 5;
  string notes = 6;
}

message BaseLayerIndex {
  repeated TerrainType base_layers = 1;
}

message TileGenerationIndex {
  repeated string tile_generation_definitions = 1;
}

message BaseLayerTransitionProbabilities {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated BaseLayerTransitionRow probabilities = 4;
}

message BaseLayerTransitionRow {
  TerrainType current_terrain_type = 1;
  repeated BaseLayerTransitionProbability next_terrain_probabilities = 2;
}

message BaseLayerTransitionProbability {
  TerrainType terrain_type = 1;
  double probability = 2;
}
