syntax = "proto3";

package strat_game.common_definitions;

import "common_definitions/common.proto";

message TileDefinition {
  string id = 1;
  string name = 2;
  TileProperties properties = 3;
  TileNotes notes = 4;
}

message TileProperties {
  Coordinates coordinates = 1;
  TerrainType terrain_type = 2;
  optional double depth = 3;
}

message Area {
  Coordinates center = 1;
  uint32 radius = 2;
}

message Route {
  Coordinates start = 1;
  repeated Coordinates waypoints = 2;
}
