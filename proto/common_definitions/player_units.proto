syntax = "proto3";

package strat_game.common_definitions;

import "common_definitions/common.proto";

message PlayerUnitDefinition {
  string id = 1;
  string name = 2;
  UnitType unit_type = 3;
  uint32 hp = 4;
  uint32 movement = 5;
  uint32 attack = 6;
  int32 observe_modifier = 7;
  double fatigue_modifier = 8;
}

message PlayerUnitIndex {
  repeated string player_units = 1;
}
