syntax = "proto3";

package strat_game.common_definitions;

import "common_definitions/common.proto";
import "common_definitions/map_2d.proto";

message CommonOrderFields {
  optional uint64 time_issued = 1;
  optional uint64 time_received = 2;
  UnitId relay_officer = 3;
  optional uint64 duration = 4;
  optional uint64 return_by = 5;
  repeated UnitId target_units = 6;
}

message ScoutOrder {
  CommonOrderFields common = 1;
  Area area = 2;
}

message ObserveOrder {
  CommonOrderFields common = 1;
  Coordinates location = 2;
}

message PatrolOrder {
  CommonOrderFields common = 1;
  Route route = 2;
}

message SeekAndDestroyOrder {
  CommonOrderFields common = 1;
  Area target_area = 2;
  repeated UnitId target_enemy_units = 3;
}

message BuildOrder {
  CommonOrderFields common = 1;
  BuildingType building_type = 2;
  Coordinates build_location = 3;
}

message RelayOrder {
  CommonOrderFields common = 1;
  Order order_to_relay = 2;
  repeated UnitId relay_target_units = 3;
}

message Order {
  oneof order {
    ScoutOrder scout = 1;
    ObserveOrder observe = 2;
    PatrolOrder patrol = 3;
    SeekAndDestroyOrder seek_and_destroy = 4;
    BuildOrder build = 5;
    RelayOrder relay = 6;
  }
}

message OrderIndex {
  repeated string orders = 1;
}
