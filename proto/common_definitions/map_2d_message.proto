syntax = "proto3";

package strat_game.common_definitions;

import "common_definitions/map_2d.proto";

message MapDimensions {
  uint32 width = 1;
  uint32 height = 2;
}

enum MapGenerationStrategy {
  MAP_GENERATION_STRATEGY_UNSPECIFIED = 0;
  MAP_GENERATION_STRATEGY_WEIGHTED_NEIGHBOR_VOTE = 1;
  MAP_GENERATION_STRATEGY_BLENDED_NEIGHBOR_WEIGHTS = 2;
}

message MapCreateRequest {
  MapDimensions map_dimensions = 1;
  optional string seed = 2;
  MapGenerationStrategy generation_strategy = 3;
}

message MapCreateResponse {
  MapDimensions map_dimensions = 1;
  string seed = 2;
  repeated TileDefinition tiles = 3;
}
