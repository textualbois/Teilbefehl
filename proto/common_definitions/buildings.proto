syntax = "proto3";

package strat_game.common_definitions;

import "common_definitions/common.proto";

message BuildingDefinition {
  BuildingType building_type = 1;
  string name = 2;
  uint32 hp = 3;
  uint32 time_to_build = 4;
  int32 observe_modifier = 5;
}

message BuildingIndex {
  repeated BuildingType buildings = 1;
}
